{% extends 'index.html' %}

{% block title %}Register Student{% endblock %}

{% block main_content %}
<div class="cms-module-header">
    <h1>Register New Student</h1>
</div>

<div class="cms-form-card">
    {% if error %}
    <div class="cms-alert-danger" style="margin-bottom: 25px;">
        <span class="cms-alert-icon">⚠️</span>
        <span class="cms-alert-message">{{ error }}</span>
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="cms-form-group">
            <label>Full Name</label>
            <input type="text" name="name" class="cms-form-input" required autocomplete="off">
        </div>

        <div class="cms-form-group">
            <label>Roll Number</label>
            <input type="text" name="roll_no" class="cms-form-input" required autocomplete="off">
        </div>

        <div class="cms-form-group">
            <label>Date of Birth</label>
            <input type="date" name="DOB" class="cms-form-input" required>
        </div>

        <div class="cms-form-group">
            <label>Department</label>
            <select name="department" class="cms-form-select" required>
                <option value="">Choose Department</option>
                {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="cms-form-group">
            <label>Semester</label>
            <input type="text" name="semester" class="cms-form-input" placeholder="e.g. 1, 2, 3, 4, 5, 6" autocomplete="off">
        </div>

        <div class="cms-form-group">
            <label>Password</label>
            <input type="password" name="password" class="cms-form-input" required>
        </div>

        <button type="submit" class="cms-btn-primary" style="width: 100%; padding: 14px; margin-top: 10px;">
            Save Student Record
        </button>
    </form>
</div>
{% endblock %}
