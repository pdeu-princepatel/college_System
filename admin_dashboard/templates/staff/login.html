<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F4F7FA] min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100 w-full max-w-md">
        <h2 class="text-2xl font-bold text-gray-800 text-center">Staff Portal Login</h2>
        <p class="text-gray-500 text-center mt-2 mb-6">Sign in with your credentials to access your dashboard</p>

        {% if messages %}
            {% for message in messages %}
                <p class="text-red-500 text-center mb-4">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-700">Username</label>
                <input type="text" name="username" required 
                    class="w-full mt-1 p-3 bg-blue-50 border border-blue-100 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" required 
                    class="w-full mt-1 p-3 bg-blue-50 border border-blue-100 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <button type="submit" 
                class="w-full mt-4 py-3 bg-[#0D1B2A] text-white font-bold rounded-lg hover:bg-[#1B263B] transition duration-200">
                Sign In to System
            </button>
        </form>
    </div>

</body>
</html>
