{% extends 'staff/base_staff.html' %}
{% block content %}
<div class="max-w-xl bg-white p-8 rounded shadow">
    <h2 class="text-xl font-bold mb-6">Register Student</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="space-y-4">
            {{ form.as_p }}
        </div>
        <button class="mt-6 bg-[#0D1B2A] text-white px-6 py-2 rounded">Save Student</button>
    </form>
</div>
{% endblock %}
